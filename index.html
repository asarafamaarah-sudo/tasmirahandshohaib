<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasmirah & Shohaib - Wedding Invitation</title>

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💍</text></svg>">

    <!-- Smooth Scroll Polyfill for older browsers -->
    <script src="https://cdn.jsdelivr.net/npm/smoothscroll-polyfill@0.4.4/dist/smoothscroll.min.js">
    </script>
</head>

<body>

    <!-- ====== OPENING SCREEN ====== -->
    <section class="hero" id="home">

        <div class="hero-content">

            <h3 class="bismillah">
                بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ
            </h3>

            <h1>Tasmirah</h1>

            <div class="and">&</div>

            <h1>Shohaib</h1>

            <p class="date">
                26 September 2026
            </p>

            <button id="openInvite" class="gold-btn" aria-label="Open wedding invitation">
                Open Invitation
            </button>

        </div>

    </section>

    <!-- ====== INVITATION PAGE 1 ====== -->
    <section class="invite-section" id="invitation">

        <img
            src="invite1.jpeg"
            alt="Wedding Invitation Page 1"
            class="invite-image"
            loading="lazy">

    </section>

    <!-- ====== INVITATION PAGE 2 ====== -->
    <section class="invite-section">

        <img
            src="invite2.jpeg"
            alt="Wedding Invitation Page 2"
            class="invite-image"
            loading="lazy">

    </section>

    <!-- ====== COUNTDOWN ====== -->
    <section class="countdown-section" id="countdown-section">

        <h2>Countdown To Our Nikkah</h2>

        <div id="countdown">

            <div class="time-box">
                <span id="days">0</span>
                <small>Days</small>
            </div>

            <div class="time-box">
                <span id="hours">0</span>
                <small>Hours</small>
            </div>

            <div class="time-box">
                <span id="minutes">0</span>
                <small>Minutes</small>
            </div>

            <div class="time-box">
                <span id="seconds">0</span>
                <small>Seconds</small>
            </div>

        </div>

    </section>

    <!-- ====== BUTTONS ====== -->
    <section class="buttons-section">

        <a
            href="https://maps.app.goo.gl/r66JHzXxkeUWDZUU6"
            target="_blank"
            class="gold-btn"
            aria-label="Get directions to the venue">
            📍 Get Directions
        </a>

        <a
            href="https://docs.google.com/forms/d/e/1FAIpQLSdLuGi6Ae6XDOpGIzZVr8qZt-eNnEECab3tBJ0PeH8fo2IZ2Q/viewform?usp=publish-editor"
            target="_blank"
            class="gold-btn"
            aria-label="RSVP for the wedding">
            ✅ RSVP
        </a>

    </section>

    <!-- ====== MUSIC TOGGLE (Optional) ====== -->
    <button id="musicToggle" aria-label="Toggle background music">
        🎵
    </button>

    <!-- ====== SCRIPTS ====== -->
    <script src="script.js"></script>

</body>

</div>
</html>
